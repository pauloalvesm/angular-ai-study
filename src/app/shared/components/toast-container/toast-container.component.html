<div class="toast-container toast-container-body position-fixed top-0 end-0 p-3">
  <div *ngFor="let toast of toastService.toasts; let i = index"
       class="toast show align-items-center text-white border-0 mb-2 shadow animation-back-in-right-1s"
       [ngClass]="'bg-' + toast.type"
       role="alert">
    <div class="d-flex">
      <div class="toast-body">
        {{ toast.message }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toastService.remove(i)"></button>
    </div>
  </div>
</div>
