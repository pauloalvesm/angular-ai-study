<div class="container mt-4 animate__animated animation-back-in-down-2s">
  <div class="card shadow-sm border-success">
    <div class="card-header card-title-ia text-white text-center">
      <h2 class="h5 mb-0 fw-bold text-title">Talk With AI</h2>
    </div>

    <div class="card-body">
      <div class="mb-3">
        <label for="promptInput" class="form-label fw-bold text-title">What do you want to know?</label>
        <textarea
          id="promptInput"
          class="form-control"
          rows="3"
          [(ngModel)]="prompt"
          placeholder="Enter your prompt here...">
        </textarea>
      </div>

      <div class="d-flex gap-2 mb-4">
        <button
          type="button"
          class="btn button-success d-flex align-items-center"
          (click)="askAi()"
          [disabled]="isLoading">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
          <i *ngIf="!isLoading" class="bi bi-check-square me-2"></i>
          {{ isLoading ? 'Processing...' : 'Ask AI' }}
        </button>

        <button
          type="button"
          class="btn button-danger d-flex align-items-center"
          (click)="handleClear()">
          <i class="bi bi-x-square me-2"></i>
          Clear
        </button>
      </div>

      <hr />

      <div class="output-container p-3 border rounded bg-light d-flex flex-column justify-content-center" style="min-height: 200px;">

        <div *ngIf="!chatResponse && !isLoading" class="text-center py-4">
          <h5 class="text-muted">The AI response will appear here...</h5>
        </div>

        <div *ngIf="isLoading" class="text-center py-4">
          <div class="spinner-grow text-title" role="status"></div>
          <p class="mt-2 text-title fw-bold">Thinking...</p>
        </div>

        <div *ngIf="chatResponse && !isLoading" class="ai-response animate__animated animate__fadeIn">
          <p class="fw-bold border-bottom pb-2 text-response text-center">Response</p>
          <div class="response-text" style="white-space: pre-wrap;">
            {{ chatResponse }}
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
