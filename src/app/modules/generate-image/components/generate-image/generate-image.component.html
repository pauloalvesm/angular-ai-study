<div class="container mt-4 animate__animated">
  <div class="card shadow-sm border-success">
    <div class="card-header card-title-ia text-white text-center">
      <h3 class="h5 mb-0 fw-bold text-title">Image Generator</h3>
    </div>

    <div class="card-body">
      <div class="row">
        <div class="col-md-5">
          <div class="mb-3">
            <label class="form-label fw-bold text-title">Image Description (Prompt)</label>
            <textarea
              class="form-control"
              [(ngModel)]="request.prompt"
              name="prompt"
              placeholder="Ex: An astronaut in Mars, digital art style, 4k..."
              rows="4">
            </textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold text-title">Quality</label>
            <select class="form-select" [(ngModel)]="request.quality" name="quality">
              <option value="standard">Standard</option>
              <option value="hd">HD</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold text-title">Number of Images</label>
            <input
              type="number"
              class="form-control"
              [(ngModel)]="request.quantity"
              name="quantity"
              min="1"
              max="4">
          </div>

          <div class="d-flex gap-2">
            <button
              type="button"
              class="btn button-success d-flex align-items-center"
              (click)="generateImage()"
              [disabled]="isLoading">

              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>

              <i *ngIf="!isLoading" class="bi bi-check-square me-2"></i>

              {{ isLoading ? 'Generating...' : 'Generate Image' }}
            </button>

            <button
              type="button"
              class="btn button-danger d-flex align-items-center"
              (click)="handleClear()">
              <i class="bi bi-x-square me-2"></i>
              Clear
            </button>
          </div>

        </div>

        <div class="col-md-7 mt-3 mt-md-0">
          <label class="form-label fw-bold d-none d-md-block">&nbsp;</label>

          <div class="p-3 border rounded bg-light d-flex align-items-center justify-content-center" style="min-height: 410px;">

            <div *ngIf="!imagesResponse.length && !isLoading" class="text-center">
              <i class="bi bi-image text-muted" style="font-size: 3rem;"></i>
              <h5 class="text-muted mt-2">Generated images will appear here...</h5>
            </div>

            <div *ngIf="isLoading" class="text-center">
              <div class="spinner-grow text-title" role="status"></div>
              <p class="mt-2 fw-bold text-title">AI is creating your image...</p>
            </div>

            <div *ngIf="imagesResponse.length && !isLoading" class="row g-3 w-100">
              <div class="col-12" *ngFor="let url of imagesResponse">
                <div class="card shadow-sm border-0">
                  <img [src]="url" class="img-fluid rounded border" alt="AI Generated Image">
                  <div class="card-footer bg-white border-top-0 text-end">
                    <a [href]="url" target="_blank" class="btn btn-sm btn-link text-success text-decoration-none">
                      Open in high resolution <i class="bi bi-box-arrow-up-right"></i>
                    </a>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
