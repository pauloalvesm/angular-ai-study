<div class="container mt-4 animate__animated animate__fadeIn">
  <div class="card shadow-sm border-success">
    <div class="card-header card-title-ia text-white text-center">
      <h3 class="h5 mb-0 fw-bold">Recipe Generator</h3>
    </div>

    <div class="card-body">
      <div class="row">
        <div class="col-md-5">
          <div class="mb-3">
            <label class="form-label fw-bold">Ingredients</label>
            <textarea
              class="form-control"
              [(ngModel)]="request.ingredients"
              placeholder="Ex: chicken, tomato, basil..."
              rows="4">
            </textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Cuisine</label>
            <input type="text" class="form-control" [(ngModel)]="request.cuisine">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Dietary Restrictions</label>
            <input type="text" class="form-control" [(ngModel)]="request.dietaryRestrictions">
          </div>

          <div class="d-flex gap-2">
            <button
              type="button"
              class="btn btn-outline-success d-flex align-items-center"
              (click)="generateRecipe()"
              [disabled]="isLoading">

              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>

              <i *ngIf="!isLoading" class="bi bi-check-square me-2"></i>

              {{ isLoading ? 'Cooking...' : 'Generate Recipe' }}
            </button>

            <button
              type="button"
              class="btn btn-outline-danger d-flex align-items-center"
              (click)="handleClear()">
              <i class="bi bi-x-square me-2"></i>
              Clear
            </button>
          </div>

        </div>

        <div class="col-md-7 mt-3 mt-md-0">
          <label class="form-label fw-bold d-none d-md-block">&nbsp;</label>

          <div class="p-3 border rounded bg-light d-flex flex-column justify-content-center" style="min-height: 335px;">

            <div *ngIf="!recipeResponse && !isLoading" class="text-center py-5">
              <h5 class="text-muted">Your recipe will appear here...</h5>
            </div>

            <div *ngIf="isLoading" class="text-center py-5">
              <div class="spinner-grow text-success" role="status"></div>
              <p class="mt-2 text-success fw-bold">Creating recipe...</p>
            </div>

            <div *ngIf="recipeResponse && !isLoading" class="recipe-text">
              <p class="fw-bold border-bottom pb-2 text-success text-center text-uppercase">Suggested Recipe</p>
              <div class="mt-3" style="white-space: pre-wrap;">{{ recipeResponse }}</div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
